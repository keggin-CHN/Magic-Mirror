name: Build Server
on:
  workflow_dispatch:
  push:
    paths:
      - "src-python/**"
      - "scripts/build-windows-server.ps1"
      - "scripts/install-windows-ort.ps1"
      - "scripts/verify-onnxruntime.py"
      - ".github/workflows/build-server.yaml"
      - "!src-python/web_server.py"
  pull_request:
    paths:
      - "src-python/**"
      - "scripts/build-windows-server.ps1"
      - "scripts/install-windows-ort.ps1"
      - "scripts/verify-onnxruntime.py"
      - ".github/workflows/build-server.yaml"
      - "!src-python/web_server.py"

jobs:
  models:
    name: Download Model Files
    timeout-minutes: 30
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache Model Files
        id: cache-models
        uses: actions/cache@v4
        with:
          path: src-python/models
          key: models-v1.0.0-${{ runner.os }}
      - name: Download Model Files
        if: steps.cache-models.outputs.cache-hit != 'true'
        id: models
        run: |
          VERSION=$(awk -F ' = "' '/version =/ {print $2}' src-python/pyproject.toml | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          mkdir -p src-python/models && cd src-python/models
          BASE_URL="https://github.com/idootop/TinyFace/releases/download/models-1.0.0"
          for model in arcface_w600k_r50.onnx gfpgan_1.4.onnx inswapper_128_fp16.onnx scrfd_2.5g.onnx; do
            echo "Downloading $model..."
            curl --fail --location --retry 5 --retry-delay 10 --retry-max-time 60 --progress-bar -O "${BASE_URL}/${model}"
            echo "  -> $(ls -lh $model | awk '{print $5}')"
          done
          cd ${{ github.workspace }}
      - name: Get version (cached)
        if: steps.cache-models.outputs.cache-hit == 'true'
        run: |
          VERSION=$(awk -F ' = "' '/version =/ {print $2}' src-python/pyproject.toml | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        id: models-cached
      - name: Upload models
        uses: actions/upload-artifact@v4
        with:
          name: models
          path: src-python/models
          if-no-files-found: error
    outputs:
      version: ${{ steps.models.outputs.version || steps.models-cached.outputs.version }}

  build-for-windows:
    name: Windows
    needs: models
    timeout-minutes: 120
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            build: windows
            os: windows-latest
            arch: x86_64
            runtime: directml
            bundle_cuda: false
          - target: x86_64-pc-windows-msvc
            build: windows
            os: windows-latest
            arch: x86_64
            runtime: cuda
            bundle_cuda: true

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Download Models
        uses: actions/download-artifact@v4
        with:
          name: models
          path: src-python/models
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11.9
          cache: "pip"
          cache-dependency-path: "**/requirements.txt"
      - name: Install Python Dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r src-python/requirements.txt
          python -m pip install -e src-python --no-deps

          if ("${{ matrix.bundle_cuda }}" -eq "true") {
            ./scripts/install-windows-ort.ps1 `
              -Runtime "${{ matrix.runtime }}" `
              -BundleCudaDependencies
          } else {
            ./scripts/install-windows-ort.ps1 `
              -Runtime "${{ matrix.runtime }}"
          }
      - name: Build Server
        shell: pwsh
        run: |
          if ("${{ matrix.runtime }}" -eq "directml") {
            ./scripts/build-windows-server.ps1 `
              -Runtime directml `
              -ConsoleMode disable `
              -CreateCompatibilityArchive
          } else {
            ./scripts/build-windows-server.ps1 `
              -Runtime cuda `
              -ConsoleMode disable
          }
      - name: Upload Server
        uses: actions/upload-artifact@v4
        with:
          name: server_${{ matrix.build }}_${{ matrix.arch }}_${{ matrix.runtime }}
          path: out/*.zip
          if-no-files-found: error

  release:
    name: Release
    if: github.event_name == 'workflow_dispatch'
    needs: [models, build-for-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          # The self-contained CUDA archive includes CUDA/cuDNN DLLs plus all
          # models and can exceed GitHub Release's 2 GiB per-asset limit. Keep
          # it available as an Actions artifact; publish the compact universal
          # DirectML package as the stable client download.
          pattern: server_windows_x86_64_directml
          path: dist
          merge-multiple: true
      - name: Release Server v${{ needs.models.outputs.version }}
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
          name: Server v${{ needs.models.outputs.version }}
          tag: server-v${{ needs.models.outputs.version }}
          body: MagicMirror Server v${{ needs.models.outputs.version }}
          draft: true
          prerelease: false
          removeArtifacts: true
          artifacts: dist/*.zip
