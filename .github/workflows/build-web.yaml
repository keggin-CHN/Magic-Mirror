name: Build Web (Debian/Ubuntu)
on:
  workflow_dispatch:
  push:
    paths:
      - "src/**"
      - "src-python/**"
      - "scripts/install-web.sh"
      - "scripts/install-server-linux.sh"
      - "index.html"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vite.config.ts"
      - "tsconfig.json"
      - "tsconfig.node.json"
      - "uno.config.ts"
      - ".github/workflows/build-web.yaml"
      - "!src-python/server.py"
      - "!src-tauri/**"
  pull_request:
    paths:
      - "src/**"
      - "src-python/**"
      - "scripts/install-web.sh"
      - "scripts/install-server-linux.sh"
      - "index.html"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vite.config.ts"
      - "tsconfig.json"
      - "tsconfig.node.json"
      - "uno.config.ts"
      - ".github/workflows/build-web.yaml"
      - "!src-python/server.py"
      - "!src-tauri/**"

jobs:
  build-web:
    name: Ubuntu 22.04 (Debian/Ubuntu)
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 8.5.1
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build web frontend
        run: VITE_OUT_DIR=dist-web pnpm build
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: "src-python/requirements.txt"
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential patchelf libgl1 libglib2.0-0
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src-python/requirements.txt
          pip install "nuitka>=2.5.9,<4.0.0"
      - name: Cache model files
        id: cache-models
        uses: actions/cache@v4
        with:
          path: src-python/models
          key: face-models-v1.0.0
      - name: Download model files
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          mkdir -p src-python/models
          cd src-python/models
          BASE_URL="https://github.com/idootop/TinyFace/releases/download/models-1.0.0"
          for model in arcface_w600k_r50.onnx gfpgan_1.4.onnx inswapper_128_fp16.onnx scrfd_2.5g.onnx; do
            echo "Downloading ${model}..."
            curl --fail --location --retry 5 --retry-delay 10 --progress-bar -O "${BASE_URL}/${model}"
          done
      - name: Build web server binary
        run: |
          python -m nuitka --standalone --assume-yes-for-downloads \
            --include-package=onnx \
            --include-package=google.protobuf \
            --include-package=onnxruntime \
            --include-package-data=onnxruntime \
            --include-package=async_tasks \
            --include-package=cv2 \
            --include-package=numpy \
            --include-package=tinyface \
            --include-package=fastapi \
            --include-package=uvicorn \
            --include-package=multipart \
            --include-package=av \
            --include-package-data=onnx \
            --include-data-files="src-python/models/*.onnx=models/" \
            --output-dir=out-web src-python/web_server.py
          test -d out-web/web_server.dist
          rm -rf web_server.dist
          cp -R out-web/web_server.dist web_server.dist
      - name: Package web bundle
        run: |
          VERSION=$(node -p "require('./package.json').version")
          chmod +x scripts/install-web.sh scripts/install-server-linux.sh
          mkdir -p dist
          tar -czf "dist/magicmirror_web_${VERSION}_debian_ubuntu_x86_64.tar.gz" \
            dist-web \
            web_server.dist \
            scripts/install-web.sh \
            scripts/install-server-linux.sh \
            LICENSE
      - name: Upload web bundle
        uses: actions/upload-artifact@v4
        with:
          name: web_debian_ubuntu_x86_64
          path: dist/*.tar.gz
          if-no-files-found: error
