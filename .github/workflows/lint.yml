name: Lint

on:
  push:
    paths:
      - "check_gpu_support.py"
      - "scripts/**"
      - "src/**"
      - "src-python/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vite.config.ts"
      - "tsconfig.json"
      - "tsconfig.node.json"
      - ".github/workflows/lint.yml"
  pull_request:
    paths:
      - "check_gpu_support.py"
      - "scripts/**"
      - "src/**"
      - "src-python/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vite.config.ts"
      - "tsconfig.json"
      - "tsconfig.node.json"
      - ".github/workflows/lint.yml"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "src-python/requirements.txt"
      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 8.5.1
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff pytest
          python -m pip install -r src-python/requirements.txt
      - name: Run ruff check
        run: ruff check check_gpu_support.py scripts/ src-python/ tests/
      - name: Check JavaScript scripts
        run: node --check scripts/dist.js
      - name: Check shell scripts
        run: bash -n scripts/build-server.sh scripts/install-server-linux.sh scripts/install-web.sh
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Build frontend
        run: pnpm build
      - name: Run tests
        run: python -m pytest tests/ -v
      - name: Check diff whitespace
        run: git diff --check
