name: Docker Build

on:
  push:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "src-python/**"
      - "src-python/requirements-docker.txt"
      - ".github/workflows/docker-build.yml"
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "src-python/**"
      - "src-python/requirements-docker.txt"
      - ".github/workflows/docker-build.yml"
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Validate Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning
          ignore: DL3008
      - name: Build Docker image
        run: docker build --build-arg SKIP_MODEL_DOWNLOAD=1 --pull -t magic-mirror:test .
