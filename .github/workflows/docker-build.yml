name: Docker Build

on:
  push:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "src-python/**"
      - ".github/workflows/docker-build.yml"
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "src-python/**"
      - ".github/workflows/docker-build.yml"
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t magic-mirror:ci .
