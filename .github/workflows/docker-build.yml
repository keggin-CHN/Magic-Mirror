name: Docker Build

on:
  push:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "src-python/**"
      - ".github/workflows/docker-build.yml"
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "src-python/**"
      - ".github/workflows/docker-build.yml"
  workflow_dispatch:

jobs:
  docker-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Validate Dockerfile syntax
        run: |
          docker run --rm -i hadolint/hadolint < Dockerfile || true
      - name: Build (dependency layer only, skip model download)
        run: |
          # Build only up to requirements install to validate Dockerfile
          docker build --target builder -t magic-mirror:ci --no-cache -f- . <<'EOF'
          FROM python:3.12-slim AS builder
          RUN apt-get update && apt-get install -y --no-install-recommends \
              libgl1-mesa-glx libglib2.0-0 wget ca-certificates \
              && rm -rf /var/lib/apt/lists/*
          WORKDIR /app
          COPY src-python/requirements-docker.txt requirements.txt
          RUN pip install --no-cache-dir -r requirements.txt
          EOF
