name: Bug Report
description: 报告 Bug 或异常行为
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢报告 Bug！请填写以下信息。
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清楚描述遇到的问题。
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 如何复现这个问题？
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么？
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 操作系统、Python 版本、是否有 GPU 等。
